name: ecowatch
description: Mobile and USSD-based civic engagement platform for environmental monitoring in Tarkwa, Ghana.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  equatable: ^2.0.7
  intl: ^0.20.2
  path: ^1.9.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.2
  geocoding: ^4.0.0
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.3
  fl_chart: ^0.70.2
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  dio: ^5.8.0+1
  http_parser: ^4.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
