# Render Blueprint — EcoWatch Tarkwa
# https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

databases:
  - name: ecowatch-db
    plan: free
    databaseName: ecowatch
    user: ecowatch

services:
  - type: web
    name: ecowatch
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecowatch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: NODE_ENV
        value: production
      - key: AT_SMS_ENABLED
        value: "false"
